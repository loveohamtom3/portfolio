{% load static %}
{% block css %}
<link rel="stylesheet" type="text/css" href="{% static 'css/login.css' %}">
{% endblock css %}

{% block content %}
    <div class="container">
    <div class="contents">
        <h1 class="contents_title">ログイン</h1>
        <br><hr><br>
        <form action="{% url 'myapp:login' %}" method="POST">
            <div class="col-md-6 offset-md-3">
                <div class="card">
                    <div class="card-body">
                        {{ form.non_field_errors }}
                        {% for field in form %}
                        <p>{{ field.label}}</p>
                        {{ field }}
                        {{ field.errors }}
                        <hr>
                        {% endfor %}
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{{ next }}" />
                        <input type="submit" value="ログイン"></input>
                    </div>
                </div>
            </div>
        </form>
        <Hr>
            <p>まだアカウントがない方は<a href="{% url 'myapp:signup' %}">こちら</a></p>
    </div>
</div>


    
{% endblock %}
</form>
