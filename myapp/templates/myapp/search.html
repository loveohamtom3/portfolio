{% load static %}
<!doctype html>
{% load django_bootstrap5 %}
<html lang="ja"> 
  <head>
 
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'myapp/css/search.css' %}">
    <title>portfolio</title> 
    {% bootstrap_css %}
    {% bootstrap_javascript %}
 
  </head>
  <body>
    <!-- navber section -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{% url 'myapp:top' %}">
        <h2 class="text-white pt-1">myapp</h2></a>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">ログイン</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">新規登録</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main>
      <!-- 検索フォーム　-->
        <div class="container">
          <div class="row">
            <div class="col-lg-7 mx-auto text-center">
        <h1 class="display-4 text-dark">お店検索</h1>
        <form method="GET" action="{% url 'myapp:myapp_search' %}">
            <input type="text" name="keyword">
            <button type="submit">検索</button>
        </form>
  
   <!-- 検索結果　-->
   <p>検索結果</p>
    {% if myapp %}
    <table class="table table-hover table-bordered">
      <thead>
        <tr>
          <th>店名</th>
          <th>住所</th>
          <th>説明</th>
          <th>メニュー</th>
        </tr>
      </thead>
    <tbody>
    {% for myapp in myapp %}
    <tr>
      <th>{{myapp.name}}</th>
      <th>{{myapp.address}}</th>
      <th>{{myapp.description}}</th>
      <th>{{myapp.menyu}}</th>
    </tr>
    {% endfor %}
    </tbody>
  </table>
    
    {% endif %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  </body>
</html>
